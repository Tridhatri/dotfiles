# Terminal
set -a terminal-features "tmux-256color:RGB"
set -g extended-keys on

# Prefix
set -g prefix C-Space
bind-key C-Space send-prefix
unbind C-b

# General
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mode-keys vi

# Status bar
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=colour255,bg=default,bold"
set -g window-status-separator ""
set -g window-status-format "#[fg=colour240]#[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour240]#[default]"
set -g window-status-current-format "#[fg=colour252]#[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour252]#[default]"
set -g status-interval 5
set -g status-left "#S"
set -g status-right ""

# Bindings
bind r source-file ~/.tmux.conf
bind b set -g status
bind x kill-window
bind E show-environment -g
bind-key -n M-BSpace send-keys C-w

# Show cheat sheet popup on new session or attach — remove hooks when no longer needed
set-hook -g after-new-session  'display-popup -E -w 58 -h 22 "printf \"\\n TMUX CHEAT SHEET  (prefix = Ctrl+Space)\\n\\n SESSIONS\\n   new     tmux new -s <name>\\n   attach  tmux attach -t <name>\\n   detach  prefix d\\n\\n WINDOWS\\n   new     prefix c\\n   next    prefix n\\n   prev    prefix p\\n   select  prefix <1-9>\\n   rename  prefix ,\\n   close   prefix x\\n\\n PANES\\n   horiz split  prefix %%\\n   vert split   prefix \\\"\\n   navigate     prefix <arrow>\\n   zoom toggle  prefix z\\n   close        prefix x\\n\\n OTHER\\n   reload config    prefix r\\n   toggle status    prefix b\\n   show env         prefix E\\n   alt+bksp         delete word\\n   mouse            click to focus / drag to resize\\n\\nPress any key to dismiss...\"; read -rk1"'
set-hook -g client-attached    'display-popup -E -w 58 -h 22 "printf \"\\n TMUX CHEAT SHEET  (prefix = Ctrl+Space)\\n\\n SESSIONS\\n   new     tmux new -s <name>\\n   attach  tmux attach -t <name>\\n   detach  prefix d\\n\\n WINDOWS\\n   new     prefix c\\n   next    prefix n\\n   prev    prefix p\\n   select  prefix <1-9>\\n   rename  prefix ,\\n   close   prefix x\\n\\n PANES\\n   horiz split  prefix %%\\n   vert split   prefix \\\"\\n   navigate     prefix <arrow>\\n   zoom toggle  prefix z\\n   close        prefix x\\n\\n OTHER\\n   reload config    prefix r\\n   toggle status    prefix b\\n   show env         prefix E\\n   alt+bksp         delete word\\n   mouse            click to focus / drag to resize\\n\\nPress any key to dismiss...\"; read -rk1"'
